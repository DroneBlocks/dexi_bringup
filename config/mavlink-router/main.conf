[General]
TcpServerPort=0

[UartEndpoint uart]
Device=/dev/ttyAMA0
Baud=500000
FlowControl=false

[UdpEndpoint local]
Mode=Server
Address=0.0.0.0
Port=14550

[UdpEndpoint MAVSDK]
Mode=Normal
Address=127.0.0.1
Port=14540

# mavlink2rest fan-out endpoint. The on-drone mavlink2rest service
# connects in via udpout from 127.0.0.1 to receive the MAVLink stream
# and re-expose it as REST + WebSocket on :8088.
[UdpEndpoint mavlink2rest]
Mode=Server
Address=0.0.0.0
Port=14770
