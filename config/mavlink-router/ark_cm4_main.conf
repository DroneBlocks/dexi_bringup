[General]
# This file contains the mavlink-router configuration

[UartEndpoint FCUSB]
Device = /dev/serial/by-id/usb-ARK_ARK_Pi6X.x_0-if00
Baud = 2000000

[UdpEndpoint GCS]
Mode = Server
Address = 0.0.0.0
Port = 14550

[UdpEndpoint MAVSDK]
Mode = Normal
Address = 127.0.0.1
Port = 14540

# mavlink2rest fan-out endpoint. The on-drone mavlink2rest service
# connects in via udpout from 127.0.0.1 to receive the MAVLink stream
# and re-expose it as REST + WebSocket on :8088.
[UdpEndpoint mavlink2rest]
Mode = Server
Address = 0.0.0.0
Port = 14770
