# DEXI Shared Configuration (base)
#
# This file holds values that are identical across all DEXI hardware
# platforms. Per-platform overrides (e.g. camera resolution on Pi 5 vs
# CM4/CM5) live in dexi_config_<platform>.yaml next to this file.
#
# At runtime, scripts/start.bash detects the platform and looks up each
# parameter in this order:
#   1. ~/.dexi-config.yaml              (user override, optional)
#   2. dexi_config_<platform>.yaml      (per-platform overlay)
#   3. dexi_config.yaml                 (this file — shared base)
#   4. hardcoded default in start.bash
#
# Copy this file (or the matching dexi_config_<platform>.yaml) to
# /home/dexi/.dexi-config.yaml to customize.

nodes:
  apriltag:
    enabled: true
    max_tags: 10
  camera:
    enabled: true
    format: "XRGB8888"
    jpeg_quality: 60
    # width / height live in dexi_config_<platform>.yaml because they
    # depend on the camera hardware attached to each platform.
  gpio:
    enabled: true
  offboard:
    enabled: true
    keyboard_control: false
  rosbridge:
    enabled: true
  servo:
    enabled: true
  yolo:
    enabled: false
    confidence_threshold: 0.65

system:
  debug_mode: false
  log_level: "info"